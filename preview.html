<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プレビュー - アリの巣コロニー</title>
  <style>
    body {
      background: #1c1917;
      color: #e7e5e4;
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 20px;
      justify-items: center;
    }
    .card {
      background: #292524;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #444;
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 1.2rem;
      text-align: center;
    }
    canvas {
      display: block;
      background: #000;
      border: 1px solid #555;
    }
  </style>
</head>
<body>
  <h1 style="text-align: center; margin-bottom: 30px;">全シーン プレビュー</h1>
  <div id="grid"></div>
  <script type="module" src="/src/canvas/preview.js"></script>
</body>
</html>
